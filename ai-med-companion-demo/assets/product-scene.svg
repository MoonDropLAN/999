<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720" role="img" aria-labelledby="title desc">
  <title id="title">AI 用药伴侣产品场景</title>
  <desc id="desc">手机正在识别药盒，旁边是电子药箱和今日服药提醒。</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f6faf8"/>
      <stop offset="0.48" stop-color="#e8f4f0"/>
      <stop offset="1" stop-color="#f7efe7"/>
    </linearGradient>
    <linearGradient id="phone" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#263231"/>
      <stop offset="1" stop-color="#121817"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="150%">
      <feDropShadow dx="0" dy="24" stdDeviation="24" flood-color="#20312c" flood-opacity=".20"/>
    </filter>
  </defs>
  <rect width="1200" height="720" fill="url(#bg)"/>
  <path d="M0 520 C170 450 302 542 438 505 C581 466 669 363 845 412 C1000 455 1051 535 1200 470 L1200 720 L0 720 Z" fill="#d8ebe3"/>
  <g filter="url(#shadow)">
    <rect x="92" y="206" width="372" height="256" rx="28" fill="#fff"/>
    <rect x="126" y="254" width="304" height="62" rx="16" fill="#e85d4f"/>
    <rect x="126" y="338" width="132" height="64" rx="14" fill="#f3f7f5"/>
    <rect x="274" y="338" width="156" height="64" rx="14" fill="#f3f7f5"/>
    <text x="154" y="295" font-family="Arial, sans-serif" font-size="30" font-weight="700" fill="#fff">降压药</text>
    <text x="154" y="379" font-family="Arial, sans-serif" font-size="20" fill="#40514d">每日 1 次</text>
    <text x="296" y="379" font-family="Arial, sans-serif" font-size="20" fill="#40514d">餐后服用</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="514" y="104" width="260" height="520" rx="38" fill="url(#phone)"/>
    <rect x="536" y="148" width="216" height="432" rx="24" fill="#f8fbfa"/>
    <rect x="560" y="180" width="168" height="132" rx="18" fill="#dfeee8"/>
    <rect x="582" y="211" width="122" height="70" rx="12" fill="#fff"/>
    <path d="M573 190 L708 190 L728 306 L555 306 Z" fill="none" stroke="#1f7a68" stroke-width="5" stroke-dasharray="14 10"/>
    <circle cx="644" cy="392" r="52" fill="#1f7a68"/>
    <path d="M622 392 L637 407 L668 373" fill="none" stroke="#fff" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="568" y="352" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#17211f">已识别药品</text>
    <text x="568" y="476" font-family="Arial, sans-serif" font-size="21" fill="#40514d">同步到电子药箱</text>
    <text x="568" y="512" font-family="Arial, sans-serif" font-size="21" fill="#40514d">生成服药计划</text>
  </g>
  <g filter="url(#shadow)">
    <rect x="832" y="234" width="272" height="248" rx="30" fill="#fff"/>
    <rect x="874" y="278" width="188" height="52" rx="14" fill="#f4d8aa"/>
    <rect x="874" y="354" width="188" height="52" rx="14" fill="#dceee9"/>
    <rect x="874" y="430" width="188" height="22" rx="11" fill="#e9efed"/>
    <text x="904" y="313" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#5a3d13">08:00</text>
    <text x="904" y="389" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#1f6155">已服用</text>
  </g>
  <g fill="none" stroke="#1f7a68" stroke-width="8" stroke-linecap="round">
    <path d="M466 305 C492 303 498 284 519 275"/>
    <path d="M782 339 C815 341 825 324 844 313"/>
